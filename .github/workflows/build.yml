name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: QuackTheSystem-macos
          - os: windows-latest
            artifact_name: QuackTheSystem-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Run build script (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          chmod +x ./scripts/build_macos.sh
          ./scripts/build_macos.sh

      - name: Run build script (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: scripts\build_windows.bat

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
          if-no-files-found: error
          retention-days: 30
